services:
  # ─────────────────────────────────────────────────────────
  # Ollama LLM Service
  # ─────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - scribot-network

  # ─────────────────────────────────────────────────────────
  # FastAPI Backend Service
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - scribot-network

  # ─────────────────────────────────────────────────────────
  # Qdrant Vector Database Service
  # ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    command: /bin/sh -c "apt-get update && apt-get install -y curl && ./entrypoint.sh"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/readyz" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scribot-network

volumes:
  ollama_data:

networks:
  scribot-network:
    driver: bridge
