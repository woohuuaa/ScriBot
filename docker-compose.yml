services:
  # ─────────────────────────────────────────────────────────
  # Ollama LLM Service
  # ─────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - scribot-network

  # ─────────────────────────────────────────────────────────
  # FastAPI Backend Service
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    working_dir: /app/backend
    volumes:
      # Mount local code for development (hot reload)
      - ./backend:/app/backend
      # Mount Docs for indexing
      - ./Docs:/app/Docs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - scribot-network

  # ─────────────────────────────────────────────────────────
  # Qdrant Vector Database Service
  # ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scribot-network

volumes:
  ollama_data:


networks:
  scribot-network:
    driver: bridge
